<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshad Milk Point - Management Portal</title>
    <style>
        :root {
            --primary: #1a365d;
            --accent: #27ae60;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            background-color: var(--light-blue);
            border-radius: 50%;
            margin: 0 auto 20px;
            background-image: url('mylogo.jpeg'); /* Uses your existing logo */
            background-size: cover;
            background-position: center;
            border: 4px solid var(--primary);
        }

        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        p {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 18px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            font-size: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-milk1 {
            background-color: var(--primary);
        }

        .btn-milk2 {
            background-color: var(--accent);
        }

        .footer-credit {
            margin-top: 40px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-circle"></div>
        <h1>Arshad Milk Point</h1>
        <p>Fresh & Pure Milk Collection Management</p>

        <div class="nav-buttons">
            <a href="milk1.html" class="btn btn-milk1">
                🥛 Milk Collection (v1)
            </a>

            <a href="milk2.html" class="btn btn-milk2">
                📊 New Data Entry (v2)
            </a>
        </div>

        <div class="footer-credit">
            © 2026 Arshad Milk Point Portal
        </div>
    </div>

</body>
</html>
