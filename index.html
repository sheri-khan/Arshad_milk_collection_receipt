<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshad Milk Point - Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-blue: #1a365d;
            --light-blue: #f0f4f8;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Vendor Selection Bar */
        #vendor-bar {
            width: 100%;
            background: white;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .scroll-wrapper {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 5px 0;
        }

        .name-btn {
            white-space: nowrap;
            padding: 10px 18px;
            background: var(--light-blue);
            border: 1px solid var(--primary-blue);
            border-radius: 25px;
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 14px;
        }

        /* Main Entry Table */
        #entry-container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 15px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .header-text {
            text-align: center;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--primary-blue);
            color: white;
            font-size: 12px;
            padding: 10px 5px;
            text-align: left;
        }

        td {
            border-bottom: 1px solid #ddd;
            padding: 8px 2px;
        }

        input {
            width: 100%;
            border: 1px solid #eee;
            padding: 8px 2px;
            font-size: 14px;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: #fffef0;
        }

        .footer-row {
            background: #f8f9fa;
            font-weight: bold;
        }

        .action-area {
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        .btn-download {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Hidden area for the clean JPEG generation */
        #render-surface {
            position: absolute;
            left: -9999px;
            top: 0;
            background: white;
            width: 400px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="vendor-bar">
    <div class="scroll-wrapper" id="name-list"></div>
</div>

<div id="entry-container">
    <div class="header-text">
        <h2 style="margin:0">ARSHAD MILK POINT</h2>
        <p style="margin:0; font-size: 11px;">FRESH & PURE MILK COLLECTION</p>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th width="40%">Name</th>
                <th width="20%">Ltr</th>
                <th width="20%">Rate</th>
                <th width="20%">Total</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
        <tfoot>
            <tr class="footer-row">
                <td>TOTAL</td>
                <td id="grand-ltr">0</td>
                <td>-</td>
                <td id="grand-total">0</td>
            </tr>
        </tfoot>
    </table>
</div>

<div class="action-area">
    <button class="btn-download" onclick="generateCleanImage()">Download JPEG Report</button>
</div>

<div id="render-surface"></div>

<script>
    const vendorNames = ["Zulfaqar", "Shezad", "Ahmad", "Rehmat", "Ashraf", "Hamza", "Alyas", "Yaqoob", "A Imran", "Iftkhar", "Sahib Khan"];

    // Initialize 30 rows
    const tbody = document.getElementById('table-body');
    for (let i = 0; i < 30; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="in-name"></td>
            <td><input type="number" class="in-ltr" oninput="calc(this)"></td>
            <td><input type="number" class="in-rate" oninput="calc(this)"></td>
            <td class="row-total">0</td>
        `;
        tbody.appendChild(tr);
    }

    // Initialize Vendor Buttons
    const nameList = document.getElementById('name-list');
    vendorNames.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'name-btn';
        btn.innerText = name;
        btn.onclick = () => {
            const inputs = document.querySelectorAll('.in-name');
            for(let input of inputs) {
                if(input.value === "") {
                    input.value = name;
                    input.closest('tr').querySelector('.in-ltr').focus();
                    break;
                }
            }
        };
        nameList.appendChild(btn);
    });

    function calc(el) {
        const row = el.closest('tr');
        const ltr = parseFloat(row.querySelector('.in-ltr').value) || 0;
        const rate = parseFloat(row.querySelector('.in-rate').value) || 0;
        const total = ltr * rate;
        
        row.querySelector('.row-total').innerText = total.toFixed(0);
        updateGrandTotals();
    }

    function updateGrandTotals() {
        let totalLtr = 0;
        let totalCash = 0;
        document.querySelectorAll('.in-ltr').forEach(el => totalLtr += (parseFloat(el.value) || 0));
        document.querySelectorAll('.row-total').forEach(el => totalCash += (parseFloat(el.innerText) || 0));
        
        document.getElementById('grand-ltr').innerText = totalLtr.toFixed(1);
        document.getElementById('grand-total').innerText = totalCash.toLocaleString();
    }

    async function generateCleanImage() {
        const renderSurface = document.getElementById('render-surface');
        renderSurface.innerHTML = ""; // Clear old data

        // Create a Clean version of the header
        const header = document.querySelector('.header-text').cloneNode(true);
        renderSurface.appendChild(header);

        // Create a Clean Table
        const cleanTable = document.createElement('table');
        cleanTable.style.width = "100%";
        cleanTable.style.borderCollapse = "collapse";
        cleanTable.style.marginTop = "20px";
        
        // Add Watermark to the render surface
        renderSurface.style.position = "relative";
        renderSurface.style.backgroundImage = "url('mylogo.jpeg')";
        renderSurface.style.backgroundRepeat = "no-repeat";
        renderSurface.style.backgroundPosition = "center";
        renderSurface.style.backgroundSize = "200px";

        // Table Header
        cleanTable.innerHTML = `<thead><tr style="background:#1a365d;color:white;">
            <th style="padding:8px;border:1px solid #ccc">Name</th>
            <th style="padding:8px;border:1px solid #ccc">Liters</th>
            <th style="padding:8px;border:1px solid #ccc">Rate</th>
            <th style="padding:8px;border:1px solid #ccc">Total</th>
        </tr></thead>`;

        const cleanBody = document.createElement('tbody');
        let hasData = false;

        // Only add rows that have a Name or Liters
        document.querySelectorAll('#table-body tr').forEach(row => {
            const name = row.querySelector('.in-name').value;
            const ltr = row.querySelector('.in-ltr').value;
            const rate = row.querySelector('.in-rate').value;
            const total = row.querySelector('.row-total').innerText;

            if (name || ltr > 0) {
                hasData = true;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding:8px;border:1px solid #ccc">${name}</td>
                    <td style="padding:8px;border:1px solid #ccc">${ltr}</td>
                    <td style="padding:8px;border:1px solid #ccc">${rate}</td>
                    <td style="padding:8px;border:1px solid #ccc;font-weight:bold">${total}</td>
                `;
                cleanBody.appendChild(tr);
            }
        });

        if(!hasData) { alert("Please enter at least one entry!"); return; }

        cleanTable.appendChild(cleanBody);

        // Add Footer to clean table
        const footer = document.createElement('tfoot');
        footer.innerHTML = `<tr style="background:#eee; font-weight:bold">
            <td style="padding:8px;border:1px solid #ccc">GRAND TOTAL</td>
            <td style="padding:8px;border:1px solid #ccc">${document.getElementById('grand-ltr').innerText}</td>
            <td style="padding:8px;border:1px solid #ccc">-</td>
            <td style="padding:8px;border:1px solid #ccc">${document.getElementById('grand-total').innerText}</td>
        </tr>`;
        cleanTable.appendChild(footer);

        renderSurface.appendChild(cleanTable);

        // Use html2canvas on the clean hidden div
        const canvas = await html2canvas(renderSurface, {
            scale: 2,
            backgroundColor: "#ffffff",
            logging: false
        });

        const link = document.createElement('a');
        link.download = `Milk_Receipt_${new Date().getTime()}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
    }
</script>

</body>
</html>
