<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshad Milk Point - Ledger System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-blue: #1a365d;
            --light-blue: #f0f4f8;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Home Button and Vendor Selector */
        #nav-header {
            width: 100%;
            background: white;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--primary-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .scroll-wrapper {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 5px 0;
        }

        .name-btn {
            white-space: nowrap;
            padding: 10px 18px;
            background: var(--light-blue);
            border: 1px solid var(--primary-blue);
            border-radius: 25px;
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 14px;
        }

        .home-link {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        /* Main Entry Table */
        #entry-container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .header-text {
            text-align: center;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--primary-blue);
            color: white;
            font-size: 11px;
            padding: 8px 2px;
            text-align: left;
        }

        td {
            border-bottom: 1px solid #ddd;
            padding: 4px 2px;
        }

        input {
            width: 100%;
            border: 1px solid #eee;
            padding: 6px 2px;
            font-size: 13px;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: #fffef0;
        }

        .footer-row {
            background: #f8f9fa;
            font-weight: bold;
            font-size: 12px;
        }

        .action-area {
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        .btn-download {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #render-surface {
            position: absolute;
            left: -9999px;
            top: 0;
            background: white;
            width: 700px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="nav-header">
    <a href="index.html" class="home-link">⬅ Back to Home</a>
    <div class="scroll-wrapper" id="name-list"></div>
</div>

<div id="entry-container">
    <div class="header-text">
        <h2 style="margin:0">ARSHAD MILK POINT</h2>
        <p style="margin:0; font-size: 11px;">LEDGER & BALANCE SHEET</p>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th width="15%">Date</th>
                <th width="20%">Name</th>
                <th width="10%">Ltr</th>
                <th width="10%">Rate</th>
                <th width="15%">Amount</th>
                <th width="15%">Paid</th>
                <th width="15%">Balance</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
        <tfoot>
            <tr class="footer-row">
                <td colspan="2">TOTAL</td>
                <td id="grand-ltr">0</td>
                <td>-</td>
                <td id="grand-amount">0</td>
                <td id="grand-paid">0</td>
                <td id="grand-balance">0</td>
            </tr>
        </tfoot>
    </table>
</div>

<div class="action-area">
    <button class="btn-download" onclick="generateCleanImage()">Download Ledger JPEG</button>
</div>

<div id="render-surface"></div>

<script>
    const vendorNames = ["Zulfaqar", "Shezad", "Ahmad", "Rehmat", "Ashraf", "Hamza", "Alyas", "Yaqoob", "A Imran", "Iftkhar", "Sahib Khan"];

    // Initialize rows with today's date
    const today = new Date().toISOString().split('T')[0];
    const tbody = document.getElementById('table-body');
    
    for (let i = 0; i < 30; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="date" class="in-date" value="${today}"></td>
            <td><input type="text" class="in-name"></td>
            <td><input type="number" class="in-ltr" oninput="calc(this)"></td>
            <td><input type="number" class="in-rate" oninput="calc(this)"></td>
            <td class="row-amount">0</td>
            <td><input type="number" class="in-paid" oninput="calc(this)"></td>
            <td class="row-balance">0</td>
        `;
        tbody.appendChild(tr);
    }

    const nameList = document.getElementById('name-list');
    vendorNames.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'name-btn';
        btn.innerText = name;
        btn.onclick = () => {
            const inputs = document.querySelectorAll('.in-name');
            for(let input of inputs) {
                if(input.value === "") {
                    input.value = name;
                    input.closest('tr').querySelector('.in-ltr').focus();
                    break;
                }
            }
        };
        nameList.appendChild(btn);
    });

    function calc(el) {
        const row = el.closest('tr');
        const ltr = parseFloat(row.querySelector('.in-ltr').value) || 0;
        const rate = parseFloat(row.querySelector('.in-rate').value) || 0;
        const paid = parseFloat(row.querySelector('.in-paid').value) || 0;
        
        const amount = ltr * rate;
        const balance = amount - paid;
        
        row.querySelector('.row-amount').innerText = amount.toFixed(0);
        row.querySelector('.row-balance').innerText = balance.toFixed(0);
        
        updateGrandTotals();
    }

    function updateGrandTotals() {
        let tLtr = 0, tAmount = 0, tPaid = 0, tBalance = 0;
        
        document.querySelectorAll('#table-body tr').forEach(row => {
            tLtr += parseFloat(row.querySelector('.in-ltr').value) || 0;
            tAmount += parseFloat(row.querySelector('.row-amount').innerText) || 0;
            tPaid += parseFloat(row.querySelector('.in-paid').value) || 0;
            tBalance += parseFloat(row.querySelector('.row-balance').innerText) || 0;
        });
        
        document.getElementById('grand-ltr').innerText = tLtr.toFixed(1);
        document.getElementById('grand-amount').innerText = tAmount.toLocaleString();
        document.getElementById('grand-paid').innerText = tPaid.toLocaleString();
        document.getElementById('grand-balance').innerText = tBalance.toLocaleString();
    }

    async function generateCleanImage() {
        const surface = document.getElementById('render-surface');
        surface.innerHTML = ""; 

        const header = document.querySelector('.header-text').cloneNode(true);
        surface.appendChild(header);

        const cleanTable = document.createElement('table');
        cleanTable.style.width = "100%";
        cleanTable.style.borderCollapse = "collapse";
        cleanTable.style.marginTop = "20px";
        
        surface.style.position = "relative";
        surface.style.backgroundImage = "url('mylogo.jpeg')";
        surface.style.backgroundRepeat = "no-repeat";
        surface.style.backgroundPosition = "center";
        surface.style.backgroundSize = "250px";

        cleanTable.innerHTML = `<thead><tr style="background:#1a365d;color:white;">
            <th style="padding:8px;border:1px solid #ccc">Date</th>
            <th style="padding:8px;border:1px solid #ccc">Name</th>
            <th style="padding:8px;border:1px solid #ccc">Ltr</th>
            <th style="padding:8px;border:1px solid #ccc">Rate</th>
            <th style="padding:8px;border:1px solid #ccc">Amount</th>
            <th style="padding:8px;border:1px solid #ccc">Paid</th>
            <th style="padding:8px;border:1px solid #ccc">Balance</th>
        </tr></thead>`;

        const cleanBody = document.createElement('tbody');
        let hasData = false;

        document.querySelectorAll('#table-body tr').forEach(row => {
            const date = row.querySelector('.in-date').value;
            const name = row.querySelector('.in-name').value;
            const ltr = row.querySelector('.in-ltr').value;
            const rate = row.querySelector('.in-rate').value;
            const amount = row.querySelector('.row-amount').innerText;
            const paid = row.querySelector('.in-paid').value || "0";
            const balance = row.querySelector('.row-balance').innerText;

            if (name || ltr > 0) {
                hasData = true;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding:8px;border:1px solid #ccc;font-size:11px">${date}</td>
                    <td style="padding:8px;border:1px solid #ccc">${name}</td>
                    <td style="padding:8px;border:1px solid #ccc">${ltr}</td>
                    <td style="padding:8px;border:1px solid #ccc">${rate}</td>
                    <td style="padding:8px;border:1px solid #ccc">${amount}</td>
                    <td style="padding:8px;border:1px solid #ccc;color:#27ae60">${paid}</td>
                    <td style="padding:8px;border:1px solid #ccc;font-weight:bold;color:${parseFloat(balance) > 0 ? '#c0392b' : '#2980b9'}">${balance}</td>
                `;
                cleanBody.appendChild(tr);
            }
        });

        if(!hasData) { alert("Please enter data!"); return; }
        cleanTable.appendChild(cleanBody);

        const footer = document.createElement('tfoot');
        footer.innerHTML = `<tr style="background:#eee; font-weight:bold">
            <td colspan="2" style="padding:8px;border:1px solid #ccc">GRAND TOTAL</td>
            <td style="padding:8px;border:1px solid #ccc">${document.getElementById('grand-ltr').innerText}</td>
            <td style="padding:8px;border:1px solid #ccc">-</td>
            <td style="padding:8px;border:1px solid #ccc">${document.getElementById('grand-amount').innerText}</td>
            <td style="padding:8px;border:1px solid #ccc;color:#27ae60">${document.getElementById('grand-paid').innerText}</td>
            <td style="padding:8px;border:1px solid #ccc">${document.getElementById('grand-balance').innerText}</td>
        </tr>`;
        cleanTable.appendChild(footer);
        surface.appendChild(cleanTable);

        const canvas = await html2canvas(surface, { scale: 2, backgroundColor: "#ffffff", logging: false });
        const link = document.createElement('a');
        link.download = `Milk_Ledger_${new Date().getTime()}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
    }
</script>
</body>
</html>
